<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Informacion sobre RE y TLOU</title>
</head>
<body>
    <main>
        <h1>Informacion basica sobre The Last Of Us y Resident Evil 4</h1>
        <ul>
            <li><h2><a href="the-last-of-us.html">The Last of Us Part I</a></h2></li>
            <li><h2><a href="resident-evil.html">Resident Evil 4</a></h2></li>
        </ul>
    </main>

    <button id="theme-toggle" style="position: fixed; bottom: 20px; left: 20px; background-color: #ff4d4d; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">
        Cambiar Tema
    </button>

    <script>
        const btn = document.getElementById('theme-toggle');
        btn.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
        });
    </script>
</body>
